<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>封神榜-伐商演义</title><style>
*{margin:0;padding:0}body{font-family:Microsoft YaHei,sans-serif;background:#0a0a15;color:#fff;min-height:100vh}#g{max-width:540px;margin:0 auto;background:linear-gradient(180deg,#151530,#0a0a18)}.s{display:none;min-height:100vh;flex-direction:column;padding:15px}.s.active{display:flex}.tt{font-size:40px;color:#ffd700;text-align:center;margin:40px 0 20px;text-shadow:0 0 25px #ff9500}.btn{background:linear-gradient(135deg,#e63946,#9d0208);border:2px solid #ffd700;color:#fff;padding:14px 36px;font-size:16px;border-radius:28px;margin:10px;cursor:pointer}.grid{grid-template-columns:repeat(2,1fr);gap:12px;display:grid}.card{background:rgba(255,255,255,0.05);border:2px solid #3a3a5c;border-radius:14px;padding:16px;text-align:center;cursor:pointer}.card.on{border-color:#ffd700;background:rgba(255,215,0,0.12)}.avatar{width:65px;height:65px;background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:3px solid #ffd700;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 10px}.msg{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.95);border:2px solid #ffd700;padding:14px 24px;border-radius:12px;z-index:100;animation:f2s 2s forwards;font-size:14px}@keyframes f2s{0%{opacity:0;transform:translate(-50%,-15px)}20%{opacity:1}80%{opacity:1}100%{opacity:0}}.dmg{position:absolute;font-size:26px;color:#ff4444;font-weight:bold;animation:fd 0.6s forwards}@keyframes fd{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-45px)}}.box{background:rgba(0,0,0,0.45);border-radius:12px;padding:14px;margin:10px 0}.act{display:grid;grid-template-columns:1fr 1fr;gap:8px}.act button{background:linear-gradient(135deg,#0077b6,#023e8a);border:1px solid #00b4d8;color:#fff;padding:12px;border-radius:10px;font-size:14px}.act .atk{background:linear-gradient(135deg,#d62828,#9d0208)}.act .skl{background:linear-gradient(135deg,#7b2cbf,#3c096c)}.act .hl{background:linear-gradient(135deg,#2d6a4f,#1b4332)}.enemy{width:100px;height:100px;background:linear-gradient(135deg,#4a1a2e,#2d0f1f);border:3px solid #ff5555;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:48px}.p{width:55px;height:55px;background:linear-gradient(135deg,#1d3557,#0d1b2a);border:2px solid #00b4d8;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px}.map-scene{background:linear-gradient(180deg,#1a1a35,#0f0f25);border-radius:14px;padding:20px;height:300px;position:relative;margin:10px 0}.map-point{position:absolute;width:46px;height:46px;background:rgba(0,0,0,0.85);border:3px solid #3a3a5c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:0.2s;z-index:10}.map-point:hover{transform:scale(1.12);border-color:#00d4ff}.map-point.on{border-color:#ffd700;background:rgba(255,215,0,0.25)}.map-point.lk{opacity:0.35}.map-point.boss{border-color:#ff0000;background:rgba(255,0,0,0.2)}.map-point.boss.on{border-color:#ffd700;background:rgba(255,215,0,0.3)}.map-path{position:absolute;bottom:25px;left:15px;right:15px;height:5px;background:#ffd700;border-radius:3px;box-shadow:0 0 10px rgba(255,215,0,0.4)}.bar{width:100%;height:8px;background:#222;border-radius:4px;margin:4px 0;overflow:hidden}.hp-bar{height:100%;background:linear-gradient(90deg,#ff4444,#ff6666);border-radius:4px}.tab-bar{display:flex;gap:8px;margin-top:12px}.tab-btn{flex:1;padding:10px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid #444;color:#888;font-size:12px;text-align:center;cursor:pointer}.tab-btn.on{background:rgba(255,215,0,0.15);border-color:#ffd700;color:#ffd700}
</style></head><body>
<div id="g"><div id="msg"></div>
<div id="title" class="s active"><div class="tt">🈚️ 封神榜</div><p style="text-align:center;color:#777;margin-bottom:30px">伐商演义 · 回合RPG</p><button class="btn" onclick="start()">开始游戏</button><p style="text-align:center;color:#555;margin-top:15px">v6.0 完整版</p></div>
<div id="chars" class="s"><h2 style="text-align:center;color:#ffd700;margin:20px 0">选择英雄</h2><div class="grid box">
<div class="card on" onclick="sc(0)"><div class="avatar">📜</div><div style="color:#ffd700;font-weight:bold">姜子牙</div><div style="color:#888;font-size:11px">辅助HP100</div></div>
<div class="card" onclick="sc(1)"><div class="avatar">🔥</div><div style="color:#ff6b6b;font-weight:bold">哪吒</div><div style="color:#888;font-size:11px">攻击HP120</div></div>
<div class="card" onclick="sc(2)"><div class="avatar">👁️</div><div style="color:#4cc9f0;font-weight:bold">杨戬</div><div style="color:#888;font-size:11px">平衡HP110</div></div>
<div class="card" onclick="sc(3)"><div class="avatar">⚡</div><div style="color:#ffd60a;font-weight:bold">雷震子</div><div style="color:#888;font-size:11px">速度HP90</div></div>
<div class="card" onclick="sc(4)"><div class="avatar">🐉</div><div style="color:#72efdd;font-weight:bold">小龙女</div><div style="color:#888;font-size:11px">治疗HP80</div></div>
<div class="card" onclick="sc(5)"><div class="avatar">🎭</div><div style="color:#c77dff;font-weight:bold">土行孙</div><div style="color:#888;font-size:11px">刺客HP70</div></div>
</div><button class="btn" onclick="cf()">开始冒险</button></div>
<div id="map" class="s"><div class="box" style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:12px;align-items:center"><div id="pico" style="font-size:32px">🔥</div><div><div id="pnm" style="color:#ffd700;font-weight:bold">哪吒 Lv.1</div><div style="color:#ff6b6b">HP: <span id="php">120</span></div></div></div><div style="color:#ffd700;font-size:20px">💰<span id="pgl">0</span></div></div><div class="map-scene" id="mapsc"><div class="map-path"></div></div><div class="tab-bar"><div class="tab-btn on" onclick="shEq()">🎒</div><div class="tab-btn" onclick="shShop()">🏪</div><div class="tab-btn" onclick="shSk()">✨</div></div></div>
<div id="battle" class="s" style="background:#0a0a15"><div style="flex:1;display:flex;flex-direction:column;justify-content:space-between"><div style="display:flex;justify-content:center;padding:20px"><div class="enemy" id="espr">👹</div></div><div style="display:flex;justify-content:center;gap:25px"><div class="p" id="pspr">🔥</div></div></div><div class="box"><div id="ename" style="color:#ff6b6b;font-weight:bold;text-align:center;font-size:20px;margin-bottom:5px">申公豹</div><div class="bar"><div class="hp-bar" id="ehpbar" style="width:100%"></div></div><div id="ehp" style="color:#888;text-align:center;font-size:12px;margin-bottom:12px">HP: 200/200</div><div class="act"><button class="atk" onclick="atk()">⚔️攻击</button><button class="skl" onclick="skl()">✨技能</button><button onclick="def()">🛡️防御</button><button class="hl" onclick="heal()">💚恢复</button></div></div></div>
<div id="shop" class="s"><h2 style="text-align:center;color:#ffd700;margin:20px 0">🏪商店</h2><p style="text-align:center;color:#ffd700">💰 <span id="sgold">0</span></p><div class="grid box" id="shg"></div><button class="btn" onclick="shMap()">返回</button></div>
<div id="equip" class="s"><h2 style="text-align:center;color:#ffd700;margin:20px 0">🎒装备</h2><div class="grid box" id="eqg"></div><button class="btn" onclick="shMap()">返回</button></div>
<div id="skills" class="s"><h2 style="text-align:center;color:#ffd700;margin:20px 0">✨技能</h2><div class="box" id="skg"></div><button class="btn" onclick="shMap()">返回</button></div>
</div>
<script>
var hero=[{n:"姜子牙",i:"📜",h:100,mh:100,a:15,d:10,sk:["封神榜","五行术","天雷击"]},{n:"哪吒",i:"🔥",h:120,mh:120,a:25,d:5,sk:["火尖枪","混天绫","乾坤圈"]},{n:"杨戬",i:"👁️",h:110,mh:110,a:20,d:15,sk:["八九玄功","三尖两刃刀","哮天犬"]},{n:"雷震子",i:"⚡",h:90,mh:90,a:18,d:8,sk:["风雷翅","雷电击","雷公锥"]},{n:"小龙女",i:"🐉",h:80,mh:80,a:12,d:10,sk:["龙吟","治愈术","冰封术"]},{n:"土行孙",i:"🎭",h:70,mh:70,a:28,d:3,sk:["陨石落","穿心钉","捆仙绳"]}];
var skE={"封神榜":2.6,"五行术":1.8,"天雷击":2.4,"火尖枪":2.0,"混天绫":1.5,"乾坤圈":2.4,"八九玄功":1.8,"三尖两刃刀":2.1,"哮天犬":1.6,"风雷翅":1.4,"雷电击":2.0,"雷公锥":2.2,"龙吟":1.2,"治愈术":0,"冰封术":1.8,"陨石落":2.5,"穿心钉":2.8,"捆仙绳":1.5};
var maps=[{t:"第一章",n:"陈塘关",ic:"🏯",en:["巡海夜叉","虾兵"],bs:"东海龙王",ex:50},{t:"第二章",n:"阐教",ic:"⛰️",en:["小妖","青毛狮"],bs:"申公豹",ex:70},{t:"第三章",n:"朝歌",ic:"🏰",en:["纣王禁卫"],bs:"纣王",ex:90},{t:"第四章",n:"摘星楼",ic:"🌙",en:["妖狐卫士"],bs:"闻仲",ex:110},{t:"第五章",n:"汜水关",ic:"🏯",en:["余化"],bs:"余元",ex:130},{t:"第六章",n:"佳梦关",ic:"🏰",en:["魔礼青"],bs:"魔家四将",ex:150},{t:"第七章",n:"青龙关",ic:"🐉",en:["张桂芳"],bs:"张奎",ex:170},{t:"第八章",n:"临潼关",ic:"⛰️",en:["欧阳淳"],bs:"临潼关主",ex:190},{t:"第九章",n:"朝歌宫",ic:"👑",en:["纣王"],bs:"纣王神",ex:250},{t:"第十章",n:"封神台",ic:"🏛️",en:["纣王"],bs:"女娲",ex:400}];
var en={"巡海夜叉":{"👺":{h:40,a:12,ex:15,g:10},"虾兵":{"🦐":{h:25,a:8,ex:8,g:5},"东海龙王":{"🐲":{h:200,a:25,ex:60,g:50},"小妖":{"👺":{h:30,a:8,ex:10,g:8},"青毛狮":{"🦁":{h:60,a:15,ex:20,g:15},"申公豹":{"👹":{h:180,a:22,ex:50,g:40},"纣王禁卫":{"💂":{h:70,a:20,ex:25,g:20},"纣王":{"👑":{h:320,a:30,ex:100,g:70},"妖狐卫士":{"🦊":{h:65,a:22,ex:22,g:18},"闻仲":{"👴":{h:260,a:28,ex:90,g:65},"余化":{"⚔️":{h:90,a:24,ex:35,g:30},"余元":{"👹":{h:220,a:30,ex:75,g:55},"魔礼青":{"👺":{h:100,a:25,ex:40,g:35},"魔家四将":{"👹":{h:360,a:33,ex:130,g:85},"张桂芳":{"⚔️":{h:100,a:25,ex:35,g:30},"张奎":{"⚔️":{h:180,a:28,ex:75,g:55},"欧阳淳":{"💂":{h:120,a:26,ex:45,g:35},"临潼关主":{"👺":{h:250,a:32,ex:95,g:70},"纣王神":{"👑":{h:520,a:42,ex:200,g:150},"女娲":{"👸":{h:800,a:55,ex:400,g:300}};
var items=[{id:0,n:"打神鞭",i:"📿",a:12,p:100},{id:1,n:"火尖枪",i:"🔱",a:18,p:150},{id:2,n:"三尖刀",i:"⚔️",a:15,p:120},{id:3,n:"八卦衣",i:"👘",d:12,p:100},{id:4,n:"混天绫",i:"🧣",d:8,p:80},{id:5,n:"定海珠",i:"💎",a:8,p:150},{id:6,n:"杏黄旗",i:"🚩",d:15,p:250},{id:7,n:"金砖",i:"🧱",a:22,p:300},{id:8,n:"诛仙剑",i:"🗡️",a:35,p:500},{id:9,n:"封神榜",i:"📜",a:45,p:800}];
var pl,gd={l:1,e:0,etl:100,gold:50,eq:[-1,-1,-1],own:[],unl:0},cm=0,ce,ph=0;
function msg(t){var m=document.createElement("div");m.className="msg";m.textContent=t;document.getElementById("msg").appendChild(m);setTimeout(function(){m.remove()},2000);}
function show(id){document.querySelectorAll(".s").forEach(function(s){s.style.display="none"});document.getElementById(id).style.display="flex"};}
function start(){show("chars");}
var cs=1;
function sc(i){cs=i;document.querySelectorAll("#chars .card").forEach(function(c,j){c.classList.toggle("on",j===i)});}
function cf(){pl=JSON.parse(JSON.stringify(hero[cs]));pl.h=pl.mh;gd={l:1,e:0,etl:100,gold:50,eq:[-1,-1,-1],own:[],unl:0};shMap();}
function shMap(){document.getElementById("pico").textContent=pl.i;document.getElementById("pnm").textContent=pl.n+" Lv."+gd.l;document.getElementById("php").textContent=Math.floor(pl.h);document.getElementById("pgl").textContent=gd.gold;drawMap();show("map");}
function drawMap(){var m=document.getElementById("mapsc");m.innerHTML='<div class="map-path"></div>';var pts=[[35,65],[90,50],[155,75],[115,115],[60,150],[145,160],[100,200],[50,240],[135,255],[85,290]];maps.forEach(function(ma,i){var p=pts[i];var d=document.createElement("div");d.className="map-point"+(i===gd.unl?" on":"")+(i>gd.unl?" lk":"")+(i===9?" boss":"");d.style.left=p[0]+"px";d.style.top=p[1]+"px";d.textContent=ma.ic;d.onclick=function(){if(i<=gd.unl){cm=i;ph=0;stBattle();}};m.appendChild(d);});}
function stBattle(){var m=maps[cm];var enName=ph<2?m.en[Math.floor(Math.random()*m.en.length)]:m.bs;var e=en[enName][Object.keys(e)[0]];ce={n:enName,i:Object.keys(e)[0],h:e.h,mh:e.h,a:e.a,ex:e.ex,g:e.g};document.getElementById("espr").textContent=ce.i;document.getElementById("ename").textContent=enName;show("battle");updUI();}
function updUI(){var hpPct=(ce.h/ce.mh)*100;document.getElementById("ehpbar").style.width=hpPct+"%";document.getElementById("ehp").textContent="HP: "+ce.h+"/"+ce.mh;document.getElementById("pspr").textContent=pl.i;}
function gAtk(){var a=pl.a;if(gd.eq[0]>=0)a+=items[gd.eq[0]].a||0;return a;}
function gDef(){var d=pl.d;if(gd.eq[1]>=0)d+=items[gd.eq[1]].d||0;return d;}
function atk(){var dmg=Math.max(1,gAtk()+Math.floor(Math.random()*8)-4);ce.h-=dmg;shDmg(dmg);msg(pl.n+" 攻击!");if(ce.h<=0){setTimeout(win,500)}else{setTimeout(eT,500)}updUI();}
function skl(){var sk=pl.sk[Math.floor(Math.random()*pl.sk.length)];var eff=skE[sk];var dmg=Math.max(1,Math.floor(gAtk()*eff)+Math.floor(Math.random()*12));ce.h-=dmg;shDmg(dmg);msg(pl.n+" 使用 "+sk+"!");if(ce.h<=0){setTimeout(win,500)}else{setTimeout(eT,500)}updUI();}
function def(){msg(pl.n+" 防御!");setTimeout(function(){eT(true)},500);}
function heal(){var h=Math.floor(pl.mh*0.3);pl.h=Math.min(pl.mh,pl.h+h);msg("恢复 "+h+" HP!");setTimeout(function(){eT()},500);updUI();}
function shDmg(n){var d=document.createElement("div");d.className="dmg";d.textContent="-"+n;d.style.left="50%";d.style.top="35%";d.style.position="absolute";document.getElementById("battle").appendChild(d);setTimeout(function(){d.remove()},600);}
function eT(def){var dmg=Math.max(1,ce.a-(def?gDef():0)+Math.floor(Math.random()*6));pl.h-=dmg;shDmg(dmg);msg(ce.n+" 攻击!");if(pl.h<=0){msg("失败...");setTimeout(function(){pl.h=pl.mh;shMap()},1500)}else{ph++;if(ph>=3){ce.h=0;win()}else{stBattle()}}updUI();}
function win(){var ex=ce.ex||50;var gl=ce.g||20;gd.e+=ex;gd.gold+=gl;msg("胜利! +"+ex+"经验 +"+gl+"金币");if(gd.e>=gd.etl){gd.l++;gd.e-=gd.etl;gd.etl=Math.floor(gd.etl*1.3);pl.mh+=10;pl.a+=2;pl.h=pl.mh;msg("升级! Lv."+gd.l);}if(ph>=2||ce.n===maps[cm].bs){if(cm>=gd.unl&&cm<maps.length-1)gd.unl=cm+1;msg("通关"+maps[cm].t+"!");setTimeout(shMap,1200);}else{ph++;setTimeout(stBattle,1000);}}
function shShop(){document.getElementById("sgold").textContent=gd.gold;var g=document.getElementById("shg");g.innerHTML="";items.forEach(function(e){var ow=gd.own.includes(e.id);var col=e.a?"#ff6b6b":"#4cc9f0";g.innerHTML+='<div style="text-align:center;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;cursor:pointer;opacity:'+(ow?"0.4":"1")+'" onclick="'+(ow?"":"by("+e.id+')")+'"><div style="font-size:24px">'+e.i+'</div><div style="color:'+col+'">'+e.n+'</div><div style="color:#ffd700;font-size:11px">💰'+e.p+'</div></div>'});show("shop");}
function by(id){var e=items.find(function(x){return x.id==id});if(gd.gold>=e.p){gd.gold-=e.p;gd.own.push(e.id);if(e.a){gd.eq[0]=e.id;pl.a+=e.a}else{gd.eq[1]=e.id;pl.d=(pl.d||0)+(e.d||0)}msg("购买 "+e.n+"!");shShop();}else{msg("金币不足!");}}
function shEq(){var g=document.getElementById("eqg");g.innerHTML="";var tp=["武器","防具","饰品"];tp.forEach(function(t,i){var e=gd.eq[i]>=0?items[gd.eq[i]]:null;g.innerHTML+='<div style="text-align:center;padding:14px;background:rgba(255,255,255,0.05);border-radius:8px;border:2px solid '+(e?"#ffd700":"#3a3a5c")+'"><div style="font-size:24px">'+(e?e.i:(i==0?"⚔️":i==1?"🛡️":"💎"))+'</div><div>'+(e?e.n:"未装备")+'</div></div>'});show("equip");}
function shSk(){var g=document.getElementById("skg");g.innerHTML="";pl.sk.forEach(function(s){g.innerHTML+='<div style="padding:10px;margin:5px 0;background:rgba(255,255,255,0.05);border-radius:8px"><span style="color:#aa44ff">'+s+'</span> <span style="float:right;color:#888">'+(skE[s]>0?skE[s]+"倍伤害":"辅助")+'</span></div>'});show("skills");}
</script></body></html>
